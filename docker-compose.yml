version: '3.8'

services:
  ocr-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-engine
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
    volumes:
      # Montage du répertoire outputs pour l'accès hôte (read-write)
      - ./outputs:/app/outputs:rw
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    # Limiter les ressources système
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    # Options de sécurité supplémentaires
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # Lecture seule pour le système de fichiers (sauf /app/outputs)
    read_only: true
    tmpfs:
      - /tmp
      - /run
