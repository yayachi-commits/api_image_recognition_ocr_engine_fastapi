services:
  ocr-engine:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        OCR_LANGUAGE: fr
        PRELOAD_PADDLE_MODELS: "true"
    container_name: ocr-engine
    init: true
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
      OCR_DEVICE: cpu
      OCR_LANGUAGE: fr
      OUTPUT_DIR: /app/outputs
      XDG_CACHE_HOME: /tmp/.cache
      MPLCONFIGDIR: /tmp/matplotlib
    volumes:
      - ./outputs:/app/outputs:rw
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=1g
