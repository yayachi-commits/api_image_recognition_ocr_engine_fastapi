services:
  ocr-engine:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.10"
        APP_UID: "${UID:-1000}"
        APP_GID: "${GID:-1000}"
        PRELOAD_PADDLE_MODELS: "true"
        PRELOAD_OCR_LANGUAGE: "fr"
    container_name: ocr-engine
    environment:
      OCR_DEVICE: cpu
      OCR_LANGUAGE: fr
      OUTPUT_DIR: /app/outputs
      PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK: "True"
      HOME: /home/appuser
      XDG_CACHE_HOME: /tmp/.cache
      MPLCONFIGDIR: /tmp/matplotlib
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    init: true
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
